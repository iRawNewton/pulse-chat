name: pulse_chat
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  bloc: ^9.2.1
  cloud_firestore: ^5.6.12
  connectivity_plus: ^7.1.1
  cupertino_icons: ^1.0.8
  dio: ^5.8.0
  firebase_auth: ^5.1.0
  firebase_core: ^3.1.0
  firebase_messaging: ^15.2.10
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.4
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  go_router: ^17.3.0
  google_sign_in: ^6.2.1
  injectable: ^3.0.0
  json_annotation: ^4.12.0
  oktoast: ^3.4.0
  path_provider: ^2.1.5
  pretty_dio_logger: ^1.4.0
  tostore: ^3.1.2

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.


dev_dependencies:
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter

  freezed: ^4.0.0-dev.3
  injectable_generator: ^3.1.0
  json_serializable: ^6.14.0
  logger: ^2.7.0
  very_good_analysis: ^10.2.0


# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    # - assets/images/
    - assets/icons/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/font/Outfit-Thin.ttf
          weight: 100
        - asset: assets/font/Outfit-ExtraLight.ttf
          weight: 200
        - asset: assets/font/Outfit-Light.ttf
          weight: 300
        - asset: assets/font/Outfit-Regular.ttf
          weight: 400
        - asset: assets/font/Outfit-Medium.ttf
          weight: 500
        - asset: assets/font/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/font/Outfit-Bold.ttf
          weight: 700
        - asset: assets/font/Outfit-ExtraBold.ttf
          weight: 800
        - asset: assets/font/Outfit-Black.ttf
          weight: 900
